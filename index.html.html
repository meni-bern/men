<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>תיעוד ליקויים</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #F5F4F0;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.15);
    --text: #1A1A1A;
    --text-muted: #888;
    --text-light: #BBB;
    --accent-light: #F0EEE8;
    --danger: #C0392B;
    --danger-bg: #FDF0EF;
    --info: #2563EB;
    --info-bg: #EFF4FF;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }

  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar-title { font-size: 17px; font-weight: 600; flex: 1; }
  .back-btn {
    background: var(--accent-light);
    border: none;
    border-radius: 50px;
    padding: 7px 14px;
    font-size: 13px;
    font-family: 'Heebo', sans-serif;
    color: var(--text);
    cursor: pointer;
    font-weight: 500;
  }

  .content { flex: 1; padding: 16px; overflow-y: auto; }

  .btn-primary {
    background: var(--text); color: #FFF;
    border: none; border-radius: var(--radius);
    padding: 15px 20px; font-size: 15px; font-weight: 600;
    font-family: 'Heebo', sans-serif; cursor: pointer;
    width: 100%; display: block; transition: opacity 0.15s;
  }
  .btn-primary:active { opacity: 0.75; }

  .btn-secondary {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border-strong); border-radius: var(--radius);
    padding: 13px 20px; font-size: 14px; font-weight: 500;
    font-family: 'Heebo', sans-serif; cursor: pointer;
    width: 100%; display: block;
  }

  .btn-danger {
    background: var(--danger-bg); color: var(--danger);
    border: none; border-radius: var(--radius-sm);
    padding: 7px 14px; font-size: 13px;
    font-family: 'Heebo', sans-serif; cursor: pointer; font-weight: 500;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 12px; overflow: hidden;
  }
  .card-body { padding: 14px 16px; }

  .field-group { margin-bottom: 16px; }
  .field-label {
    font-size: 12px; font-weight: 600; color: var(--text-muted);
    margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em;
  }

  input[type=text] {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 12px 14px; font-size: 15px;
    font-family: 'Heebo', sans-serif; color: var(--text);
    outline: none; transition: border-color 0.15s; -webkit-appearance: none;
  }
  input[type=text]:focus { border-color: var(--text); }

  /* Photo items in add screen */
  .photo-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 12px;
  }
  .photo-item img {
    width: 100%; max-height: 220px;
    object-fit: cover; display: block;
  }
  .photo-item-body { padding: 10px 12px 12px; }
  .photo-item-desc {
    width: 100%; border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 10px 12px; font-size: 14px;
    font-family: 'Heebo', sans-serif; color: var(--text);
    outline: none; resize: none; background: var(--bg);
    display: block;
  }
  .photo-item-desc:focus { border-color: var(--text); background: var(--surface); }
  .photo-item-footer { display: flex; justify-content: flex-end; margin-top: 8px; }

  .add-photo-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--bg); border: 2px dashed var(--border-strong);
    border-radius: var(--radius); padding: 20px;
    font-size: 15px; font-weight: 600; color: var(--text-muted);
    font-family: 'Heebo', sans-serif; cursor: pointer; width: 100%;
  }
  .add-photo-btn:active { background: var(--accent-light); }

  /* Home list */
  .defect-badge {
    display: inline-flex; align-items: center;
    background: var(--info-bg); color: var(--info);
    border-radius: 50px; padding: 3px 10px;
    font-size: 12px; font-weight: 600; margin-bottom: 8px;
  }

  .photos-strip {
    display: flex; gap: 6px; overflow-x: auto;
    padding: 0 16px 12px; scrollbar-width: none;
  }
  .photos-strip::-webkit-scrollbar { display: none; }

  .strip-photo-wrap { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 90px; }
  .strip-photo-wrap img {
    width: 90px; height: 70px; object-fit: cover;
    border-radius: 8px; border: 1px solid var(--border);
  }
  .strip-photo-desc {
    font-size: 11px; color: var(--text-muted);
    margin-top: 4px; text-align: center;
    width: 90px; word-break: break-word; line-height: 1.3;
  }

  .defect-meta {
    display: flex; justify-content: space-between;
    align-items: center; margin-top: 4px;
  }
  .defect-time { font-size: 11px; color: var(--text-light); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; display: block; }
  .empty-state h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .empty-state p { font-size: 14px; line-height: 1.5; }

  .stats-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .stat-card {
    flex: 1; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 12px; text-align: center;
  }
  .stat-num { font-size: 22px; font-weight: 700; }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-weight: 500; }

  .bottom-bar {
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    display: flex; gap: 10px;
  }

  /* Report */
  .report-header {
    background: var(--text); color: #FFF;
    border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
  }
  .report-company { font-size: 11px; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.08em; }
  .report-title { font-size: 20px; font-weight: 700; margin: 4px 0 8px; }
  .report-meta { font-size: 12px; opacity: 0.65; }

  .report-defect-header {
    font-size: 13px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.05em;
    margin: 16px 0 8px;
  }
  .report-defect-loc { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }

  .report-photo-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; margin-bottom: 10px;
  }
  .report-photo-card img { width: 100%; max-height: 240px; object-fit: cover; display: block; }
  .report-photo-card-desc { padding: 12px 14px; font-size: 14px; line-height: 1.6; color: var(--text); }

  @media print {
    .bottom-bar, .topbar, .back-btn { display: none !important; }
    .report-photo-card { break-inside: avoid; }
  }
</style>
</head>
<body>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="topbar">
    <span class="topbar-title">תיעוד ליקויים</span>
  </div>
  <div class="content">
    <div class="field-group">
      <div class="field-label">שם הפרויקט / לקוח</div>
      <input type="text" id="project-name" placeholder="לדוגמה: שיקום מבנה רחוב הרצל 5" oninput="save()">
    </div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="count-num">0</div>
        <div class="stat-label">ליקויים</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="photo-num">0</div>
        <div class="stat-label">תמונות</div>
      </div>
    </div>
    <div id="defects-list"></div>
    <div id="empty-state" class="empty-state">
      <span class="empty-icon">🔍</span>
      <h3>אין ליקויים עדיין</h3>
      <p>לחץ על הכפתור למטה<br>כדי להוסיף את הליקוי הראשון</p>
    </div>
  </div>
  <div class="bottom-bar">
    <button class="btn-primary" onclick="goToAdd()" style="flex:2">+ הוסף ליקוי</button>
    <button class="btn-secondary" onclick="goToReport()" style="flex:1">דוח</button>
  </div>
</div>

<!-- ADD / EDIT -->
<div id="screen-add" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="goHome()">← חזרה</button>
    <span class="topbar-title" id="add-title">ליקוי חדש</span>
  </div>
  <div class="content">
    <div class="field-group">
      <div class="field-label">מיקום (אופציונלי)</div>
      <input type="text" id="defect-location" placeholder="לדוגמה: קומה 2, חדר שינה">
    </div>

    <div class="field-label" style="margin-bottom:10px">תמונות ותיאורים</div>
    <div id="photo-items-list"></div>
    <button class="add-photo-btn" onclick="document.getElementById('photo-input').click()">
      📷 &nbsp;הוסף תמונה
    </button>
    <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(this)">

    <div style="height:16px"></div>
    <button class="btn-primary" onclick="saveDefect()">שמור ליקוי</button>
    <div style="height:10px"></div>
    <button class="btn-secondary" onclick="goHome()">ביטול</button>
    <div style="height:24px"></div>
  </div>
</div>

<!-- REPORT -->
<div id="screen-report" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="goHome()">← חזרה</button>
    <span class="topbar-title">תצוגת דוח</span>
  </div>
  <div class="content">
    <div id="report-content"></div>
    <div style="height:20px"></div>
  </div>
  <div class="bottom-bar">
    <button class="btn-primary" onclick="window.print()">🖨️ הדפס / שמור PDF</button>
  </div>
</div>

<script>
let defects = [];
let editingId = null;
let pendingPhotos = [];

try {
  const s = localStorage.getItem('likuyim_v2');
  if (s) defects = JSON.parse(s);
  const p = localStorage.getItem('likuyim_project');
  if (p) document.getElementById('project-name').value = p;
} catch(e) {}

function save() {
  try {
    localStorage.setItem('likuyim_v2', JSON.stringify(defects));
    localStorage.setItem('likuyim_project', document.getElementById('project-name').value);
  } catch(e) {}
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

function goHome() {
  editingId = null;
  pendingPhotos = [];
  showScreen('home');
  renderList();
}

function goToAdd() {
  editingId = null;
  pendingPhotos = [];
  document.getElementById('defect-location').value = '';
  document.getElementById('add-title').textContent = 'ליקוי חדש';
  renderPhotoItems();
  showScreen('add');
}

function goToReport() { renderReport(); showScreen('report'); }

function handlePhoto(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    pendingPhotos.push({ dataUrl: e.target.result, desc: '' });
    renderPhotoItems();
    setTimeout(() => window.scrollTo(0, document.body.scrollHeight), 80);
  };
  reader.readAsDataURL(input.files[0]);
  input.value = '';
}

function removePhoto(i) {
  pendingPhotos.splice(i, 1);
  renderPhotoItems();
}

function renderPhotoItems() {
  const container = document.getElementById('photo-items-list');
  if (pendingPhotos.length === 0) { container.innerHTML = ''; return; }
  container.innerHTML = pendingPhotos.map((p, i) => `
    <div class="photo-item">
      <img src="${p.dataUrl}">
      <div class="photo-item-body">
        <textarea class="photo-item-desc" rows="2"
          placeholder="תיאור לתמונה זו..."
          id="pdesc_${i}"
        >${esc(p.desc)}</textarea>
        <div class="photo-item-footer">
          <button class="btn-danger" onclick="removePhoto(${i})">הסר תמונה</button>
        </div>
      </div>
    </div>
  `).join('');

  pendingPhotos.forEach((p, i) => {
    const el = document.getElementById('pdesc_' + i);
    if (el) el.addEventListener('input', function() { pendingPhotos[i].desc = this.value; });
  });
}

function saveDefect() {
  if (pendingPhotos.length === 0) { alert('יש להוסיף לפחות תמונה אחת'); return; }
  const location = document.getElementById('defect-location').value.trim();
  const now = new Date();
  const timeStr = now.toLocaleDateString('he-IL') + ' ' + now.toLocaleTimeString('he-IL', {hour:'2-digit',minute:'2-digit'});
  const photos = pendingPhotos.map(p => ({ dataUrl: p.dataUrl, desc: p.desc.trim() }));

  if (editingId) {
    const idx = defects.findIndex(d => d.id === editingId);
    if (idx !== -1) { defects[idx].location = location; defects[idx].photos = photos; }
  } else {
    defects.push({ id: Date.now(), location, photos, time: timeStr });
  }
  save();
  goHome();
}

function deleteDefect(id) {
  if (!confirm('למחוק ליקוי זה?')) return;
  defects = defects.filter(d => d.id !== id);
  save();
  renderList();
}

function editDefect(id) {
  const d = defects.find(d => d.id === id);
  if (!d) return;
  editingId = id;
  pendingPhotos = (d.photos || []).map(p => ({ dataUrl: p.dataUrl, desc: p.desc || '' }));
  document.getElementById('defect-location').value = d.location || '';
  document.getElementById('add-title').textContent = 'עריכת ליקוי';
  renderPhotoItems();
  showScreen('add');
}

function renderList() {
  const list = document.getElementById('defects-list');
  const empty = document.getElementById('empty-state');
  const totalPhotos = defects.reduce((s, d) => s + (d.photos ? d.photos.length : 0), 0);
  document.getElementById('count-num').textContent = defects.length;
  document.getElementById('photo-num').textContent = totalPhotos;

  if (defects.length === 0) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  list.innerHTML = defects.map((d, i) => `
    <div class="card">
      <div class="card-body" style="padding-bottom:8px">
        <div class="defect-badge">ליקוי #${i + 1}</div>
        ${d.location ? `<div style="font-size:12px;color:var(--text-muted);margin-bottom:6px">📍 ${esc(d.location)}</div>` : ''}
        <div style="font-size:13px;color:var(--text-muted)">${d.photos ? d.photos.length : 0} תמונות</div>
      </div>
      ${d.photos && d.photos.length ? `
        <div class="photos-strip">
          ${d.photos.map(p => `
            <div class="strip-photo-wrap">
              <img src="${p.dataUrl}" alt="">
              ${p.desc ? `<div class="strip-photo-desc">${esc(p.desc)}</div>` : ''}
            </div>
          `).join('')}
        </div>
      ` : ''}
      <div class="card-body" style="padding-top:4px">
        <div class="defect-meta">
          <span class="defect-time">${d.time}</span>
          <div style="display:flex;gap:8px">
            <button class="btn-secondary" onclick="editDefect(${d.id})" style="width:auto;padding:7px 14px;font-size:13px">עריכה</button>
            <button class="btn-danger" onclick="deleteDefect(${d.id})">מחק</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderReport() {
  const project = document.getElementById('project-name').value.trim() || 'פרויקט ללא שם';
  const today = new Date().toLocaleDateString('he-IL', {year:'numeric',month:'long',day:'numeric'});
  const content = document.getElementById('report-content');
  const totalPhotos = defects.reduce((s, d) => s + (d.photos ? d.photos.length : 0), 0);

  if (defects.length === 0) {
    content.innerHTML = `<div class="empty-state"><span class="empty-icon">📄</span><h3>אין ליקויים לדוח</h3></div>`;
    return;
  }

  content.innerHTML = `
    <div class="report-header">
      <div class="report-company">דוח ליקויים — שיקום מבנים</div>
      <div class="report-title">${esc(project)}</div>
      <div class="report-meta">תאריך: ${today} &nbsp;|&nbsp; ${defects.length} ליקויים &nbsp;|&nbsp; ${totalPhotos} תמונות</div>
    </div>
    ${defects.map((d, i) => `
      <div>
        <div class="report-defect-header">ליקוי מספר ${i + 1}</div>
        ${d.location ? `<div class="report-defect-loc">📍 ${esc(d.location)}</div>` : ''}
        ${(d.photos || []).map(p => `
          <div class="report-photo-card">
            <img src="${p.dataUrl}" alt="">
            ${p.desc ? `<div class="report-photo-card-desc">${esc(p.desc)}</div>` : ''}
          </div>
        `).join('')}
      </div>
    `).join('')}
    <div style="text-align:center;padding:20px;font-size:12px;color:var(--text-light)">— סוף הדוח —</div>
  `;
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

renderList();
</script>
</body>
</html>
